<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kushal Subedi | Terminal OS</title>

<style>
  body {
    margin: 0;
    background: #0b0f17;
    color: #c5c6c7;
    font-family: "Courier New", monospace;
  }

  .terminal {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
  }

  .line {
    white-space: pre-wrap;
    margin: 4px 0;
  }

  .green { color: #66fcf1; }
  .dim { color: #777; }

  .input-line {
    display: flex;
    margin-top: 10px;
  }

  .prompt {
    color: #66fcf1;
    margin-right: 8px;
  }

  input {
    background: transparent;
    border: none;
    outline: none;
    color: #c5c6c7;
    font-family: inherit;
    width: 100%;
  }

  .boot {
    color: #45a29e;
  }

  .card {
    margin-top: 10px;
    padding: 10px;
    border-left: 2px solid #66fcf1;
  }
</style>
</head>

<body>

<div class="terminal" id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

const bootLines = [
  "> booting portfolio...",
  "> loading profile...",
  "> initializing dev environment...",
  "> connecting to github.io...",
  "> welcome kushal_"
];

let i = 0;

function typeBoot() {
  if (i < bootLines.length) {
    const line = document.createElement("div");
    line.className = "line boot";
    line.textContent = bootLines[i];
    terminal.appendChild(line);
    i++;
    setTimeout(typeBoot, 700);
  } else {
    setTimeout(initTerminal, 500);
  }
}

function initTerminal() {
  printLine("\nType 'help' to see commands\n");

  const inputLine = document.createElement("div");
  inputLine.className = "input-line";

  const prompt = document.createElement("span");
  prompt.className = "prompt";
  prompt.textContent = "kushal@github:~$";

  const input = document.createElement("input");
  input.autofocus = true;

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      handleCommand(input.value);
      input.value = "";
    }
  });

  inputLine.appendChild(prompt);
  inputLine.appendChild(input);
  terminal.appendChild(inputLine);
}

function printLine(text, cls="line") {
  const div = document.createElement("div");
  div.className = cls;
  div.textContent = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function handleCommand(cmd) {
  printLine(`kushal@github:~$ ${cmd}`, "line dim");

  switch(cmd.trim().toLowerCase()) {
    case "help":
      printLine("Available commands:");
      printLine("  about      - who is kushal");
      printLine("  skills     - tech stack");
      printLine("  projects   - show projects");
      printLine("  contact    - contact info");
      break;

    case "about":
      printCard("DevOps Engineer from Nepal.\nFocused on Linux, Docker, CI/CD, AWS, backend systems.");
      break;

    case "skills":
      printCard("Python, Go, Docker, AWS, Linux, CI/CD, System Design");
      break;

    case "projects":
    <!-- print link as well  -->
      printCard("suSHH - SSH manager\nCI/CD pipelines\nDevOps lab experiments \pipeline builder 'deploya'");
      printCard("GitHub: github.com/kushalsubedi/suSHH");
      printCard("GitHub: github.com/kushalsubedi/deploya");
     
      break;

    case "contact":
      printCard("GitHub: github.com/yourusername\nEmail: kushal@example.com");
       printCard("GitHub: github.com/kushalsubedi\nLinkedIn: linkedin.com/in/kushalsubedi");
      break;

    case "clear":
      terminal.innerHTML = "";
      initTerminal();
      break;

    default:
      printLine("Command not found. Type 'help'");
  }
}

function printCard(text) {
  const div = document.createElement("div");
  div.className = "card";
  div.textContent = text;
  terminal.appendChild(div);
}

typeBoot();
</script>

</body>
</html>
