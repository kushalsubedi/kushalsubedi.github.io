<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sagun</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@300;600&display=swap');

        :root {
            --gold: #ffcf4d;
            --soft-white: #f8fafc;
            --deep-space: #020617;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-space);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
            padding: 20px;
        }

        .stars {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            z-index: -2;
        }

        .led-curtain {
            position: fixed;
            top: -10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 1;
            opacity: 0.8;
        }

        .wire {
            width: 1px;
            height: 90px;
            background: rgba(255,255,255,0.08);
            position: relative;
            display: flex;
            justify-content: center;
        }

        .bulb {
            position: absolute;
            bottom: -10px;
            width: 12px;
            height: 18px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 18px var(--gold);
            animation: pulse 2.2s infinite ease-in-out;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2.2rem 1.6rem; /* reduced height */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            max-width: 420px; /* smaller card */
            width: 92%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.75);
            transform-style: preserve-3d;
            animation: floatCard 6s infinite ease-in-out;
        }

        .cake-wrapper { margin-bottom: 1.8rem; }

        .cake-tier {
            width: 110px;
            height: 34px;
            background: linear-gradient(#e2e8f0, #94a3b8);
            border-radius: 8px;
            margin: 0 auto;
            position: relative;
        }

        .cake-tier.top {
            width: 75px;
            height: 30px;
            margin-bottom: -6px;
        }

        .candle {
            width: 7px;
            height: 22px;
            background: #f43f5e;
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
        }

        .flame {
            width: 12px;
            height: 18px;
            background: #fbbf24;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 16px #f59e0b;
            animation: flameWobble 0.6s infinite alternate;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: white;
            margin-bottom: 1rem;
        }

        .name {
            background: linear-gradient(to right, #fbbf24, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 1.6rem;
            font-style: italic;
        }

        .btn {
            background: white;
            color: black;
            border: none;
            padding: 14px 34px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255,255,255,0.35);
            letter-spacing: 3px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes flameWobble {
            from { transform: translateX(-50%) rotate(-3deg) scale(1); }
            to { transform: translateX(-50%) rotate(3deg) scale(1.1); }
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="led-curtain">
        <div class="wire"><div class="bulb"></div></div>
        <div class="wire" style="height:110px"><div class="bulb" style="animation-delay:.4s"></div></div>
        <div class="wire" style="height:85px"><div class="bulb" style="animation-delay:.9s"></div></div>
        <div class="wire" style="height:120px"><div class="bulb" style="animation-delay:.2s"></div></div>
        <div class="wire" style="height:95px"><div class="bulb" style="animation-delay:.7s"></div></div>
    </div>

    <div class="container">
        <div class="cake-wrapper">
            <div class="cake-tier top">
                <div class="candle"><div class="flame"></div></div>
            </div>
            <div class="cake-tier"></div>
        </div>

        <h1>For <span class="name">Sagun</span></h1>

        <p>
            May the year ahead be a quiet masterpiece unfolding with grace,
            etched with purpose, and glowing with warmth.
            May your eyes always find beauty in the world,
            and your heart stay kind and full of light. Happy Birthday.
        </p>

        <button class="btn" onclick="ignite()">Ignite the Night</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function ignite() {
            const end = Date.now() + 3500;
            const colors = ['#fbbf24', '#f43f5e', '#ffffff'];

            (function frame() {
                confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0, y: 0.8 }, colors });
                confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, colors });

                if (Date.now() < end) requestAnimationFrame(frame);
            })();

            setTimeout(() => {
                confetti({ particleCount: 140, spread: 90, origin: { y: 0.6 }, scalar: 1.4, shapes: ['star'] });
            }, 400);
        }
    </script>
</body>
</html>
