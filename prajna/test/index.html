<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error: Love Not Found 💔</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --velvet: #1a050a;
            --rose-gold: #e5989b;
            --cream: #fff0f3;
            --primary: #ff4d6d;
            --error: #ff0033;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--velvet);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        .ambient-glow {
            position: absolute;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #3d0d1a 0%, #1a050a 100%);
            z-index: -1;
        }

        .message-card {
            padding: 60px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(229, 152, 155, 0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        h1 { font-family: 'Cinzel', serif; color: var(--rose-gold); letter-spacing: 4px; margin-bottom: 20px; transition: 0.3s; }
        #status { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--rose-gold); opacity: 0.6; margin-bottom: 30px; }

        .btn-container {
            height: 60px;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        .btn {
            padding: 12px 35px;
            border-radius: 50px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            letter-spacing: 2px;
            transition: transform 0.2s, opacity 0.3s;
        }

        #yesBtn {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.4);
        }

        #noBtn {
            background: transparent;
            border: 1px solid var(--rose-gold);
            color: var(--rose-gold);
        }

        /* Glitch Animation */
        .glitch {
            animation: glitch 0.2s infinite;
            color: var(--error) !important;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* Butterflies */
        .butterfly { position: absolute; pointer-events: none; transform-style: preserve-3d; z-index: 5; }
        .wing { position: absolute; width: 12px; height: 18px; background: rgba(229, 152, 155, 0.5); border-radius: 50% 50% 0 50%; animation: flap 0.2s infinite alternate; }
        .right { left: 12px; border-radius: 50% 50% 50% 0; transform-origin: left; }
        .left { transform-origin: right; }
        @keyframes flap { from { transform: rotateY(0deg); } to { transform: rotateY(80deg); } }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="message-card">
        <h1 id="headline">Will you be mine?</h1>
        <p id="status">Initializing romantic protocols...</p>
        <div class="btn-container">
            <button id="yesBtn" class="btn">YES</button>
            <button id="noBtn" class="btn">NO</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const status = document.getElementById('status');
        const headline = document.getElementById('headline');

        // NO Button Escape
        const escape = (btn) => {
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        };

        noBtn.addEventListener('mouseover', () => escape(noBtn));

        // YES Button Prank Logic
        yesBtn.addEventListener('click', () => {
            // Step 1: Turn into NO and Glitch
            yesBtn.innerHTML = "NO";
            yesBtn.classList.add('glitch');
            headline.classList.add('glitch');
            status.innerHTML = "CRITICAL ERROR: CONSENT_ARRAY_OVERFLOW";

            // Step 2: Disappear after a short delay
            setTimeout(() => {
                yesBtn.style.transform = "scale(0)";
                yesBtn.style.opacity = "0";
                
                setTimeout(() => {
                    yesBtn.remove(); // GONE FOREVER
                    status.innerHTML = "REPAIRING SYSTEM... PLEASE HOLD";
                    
                    // Step 3: The "Recovery"
                    setTimeout(restoreLove, 3000);
                }, 500);
            }, 1000);
        });

        function restoreLove() {
            headline.classList.remove('glitch');
            headline.innerHTML = "Fine, I'll make it easy.";
            status.innerHTML = "Override complete. Hearts deploying.";
            
            // Create a giant, unmissable YES button
            const giantYes = document.createElement('button');
            giantYes.className = 'btn';
            giantYes.innerHTML = "CLICK HERE TO BE MINE ❤️";
            giantYes.style.cssText = "background: var(--primary); color: white; width: 300px; height: 80px; font-size: 1.2rem; position: relative; z-index: 100; cursor: pointer;";
            
            document.querySelector('.btn-container').innerHTML = '';
            document.querySelector('.btn-container').appendChild(giantYes);

            giantYes.onclick = () => {
                headline.innerHTML = "Finally! Happy Valentine's!";
                status.innerHTML = "System status: In Love.";
                giantYes.style.display = 'none';
                spawnButterflies();
            };
        }

        function spawnButterflies() {
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'butterfly';
                    b.innerHTML = '<div class="wing left"></div><div class="wing right"></div>';
                    document.body.appendChild(b);
                    let pX = Math.random() * window.innerWidth;
                    let pY = window.innerHeight + 50;
                    function m() {
                        pY -= 3; pX += Math.sin(pY/50)*3;
                        b.style.left = pX+'px'; b.style.top = pY+'px';
                        if(pY > -50) requestAnimationFrame(m); else b.remove();
                    }
                    m();
                }, i * 50);
            }
        }

        // Initial Reveal
        setTimeout(() => { status.innerHTML = "System Ready."; }, 2000);
    </script>
</body>
</html>
