<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magical Valentine's 🦋</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,600&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --velvet: #1a050a;
            --rose-gold: #e5989b;
            --cream: #fff0f3;
            --butterfly-wing: rgba(255, 180, 162, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--velvet);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            perspective: 1000px;
        }

        .ambient-glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #3d0d1a 0%, #1a050a 100%);
            z-index: -1;
        }

        /* --- BUTTERFLIES --- */
        .butterfly {
            position: absolute;
            width: 40px;
            height: 40px;
            transform-style: preserve-3d;
            pointer-events: none;
            z-index: 2;
        }

        .wing {
            position: absolute;
            width: 20px;
            height: 25px;
            background: var(--butterfly-wing);
            border-radius: 50% 50% 20% 50%;
            box-shadow: 0 0 10px var(--rose-gold);
        }

        .left-wing {
            transform-origin: right center;
            animation: flap-left 0.4s ease-in-out infinite alternate;
        }

        .right-wing {
            left: 20px;
            border-radius: 50% 50% 50% 20%;
            transform-origin: left center;
            animation: flap-right 0.4s ease-in-out infinite alternate;
        }

        @keyframes flap-left {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(70deg); }
        }

        @keyframes flap-right {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-70deg); }
        }

        /* --- INTRO SEQUENCES --- */
        .intro-assets {
            display: flex;
            gap: 50px;
            margin-bottom: 20px;
        }

        .rose-intro {
            font-size: 80px;
            opacity: 0;
            transform: scale(0.2);
            animation: bloom 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 0.5s;
            filter: drop-shadow(0 0 15px var(--rose-gold));
        }

        .cake-intro {
            font-size: 80px;
            opacity: 0;
            transform: translateY(40px);
            animation: slideUp 1.5s ease-out forwards;
            animation-delay: 2.5s;
            filter: drop-shadow(0 0 20px rgba(255, 180, 162, 0.4));
        }

        /* --- MESSAGE CARD --- */
        .container {
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .message-card {
            padding: 50px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(229, 152, 155, 0.15);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInCard 2.5s ease-out forwards;
            animation-delay: 4.5s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--rose-gold);
            font-size: 2.5rem;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--cream);
            line-height: 2;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        @keyframes bloom { to { opacity: 1; transform: scale(1.1) rotate(5deg); } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInCard { to { opacity: 1; transform: translateY(0); } }

        /* Subtle Sparkles */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: sparkleAnim 3s linear infinite;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="container">
        <div class="intro-assets">
            <div class="rose-intro">🌹</div>
            <div class="cake-intro">🎂</div>
        </div>

        <div class="message-card">
            <h1>Eternity</h1>
<p>
    🕊️ Amidst the flutter of wings,<br>
    🌹 A rose for your grace,<br>
    🎂 A cake for your joy,<br>
    ❤️ And all my love, forever.<br>
    <br>
    💌 Happy Valentine’s Day!<br>
    <br>
    From Prajna 💖
</p>
        </div>
    </div>

    <script>
        // 1. Create Butterflies
        function createButterfly() {
            const b = document.createElement('div');
            b.className = 'butterfly';
            b.innerHTML = '<div class="wing left-wing"></div><div class="wing right-wing"></div>';
            
            // Random start position
            let startX = Math.random() * window.innerWidth;
            let startY = window.innerHeight + 50;
            b.style.left = startX + 'px';
            b.style.top = startY + 'px';
            
            document.body.appendChild(b);

            // Animate path using JS for organic movement
            let posX = startX;
            let posY = startY;
            let angle = Math.random() * Math.PI * 2;
            let speed = 1 + Math.random() * 2;

            function move() {
                posX += Math.sin(angle) * speed;
                posY -= speed; // Move upwards
                angle += 0.05; // Gentle waving
                
                b.style.left = posX + 'px';
                b.style.top = posY + 'px';
                b.style.transform = `rotateZ(${Math.sin(angle) * 20}deg)`;

                if (posY > -100) {
                    requestAnimationFrame(move);
                } else {
                    b.remove();
                }
            }
            requestAnimationFrame(move);
        }

        // Butterflies start appearing after the rose blooms
        setTimeout(() => {
            setInterval(createButterfly, 1200);
        }, 1000);

        // 2. Sparkle background
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const size = Math.random() * 3 + 'px';
            s.style.width = size;
            s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 3000);
        }, 200);

        // 3. Smooth Mouse Tilt for the card
        const card = document.querySelector('.message-card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
        });
    </script>
</body>
</html>
